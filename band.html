<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Band Control - U R The Star</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink: #fc8600;
      --cyan: #0bb0c3;
      --bg: #0a0a0a;
      --surface: #141414;
      --surface2: #1e1e1e;
      --border: rgba(255,255,255,0.08);
      --text: #ffffff;
      --muted: rgba(255,255,255,0.45);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }

    header {
      padding: 12px 24px;
      background: #000;
      border-bottom: 1px solid var(--border);
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 16px;
    }

    .header-left  { display: flex; align-items: center; gap: 16px; }
    .header-mid   { display: flex; justify-content: center; }
    .header-right { display: flex; align-items: center; justify-content: flex-end; gap: 16px; }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 42px;
      letter-spacing: 2px;
      background: linear-gradient(90deg, #fff 40%, var(--cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .band-badge {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--cyan);
      background: rgba(0,194,255,0.1);
      border: 1px solid rgba(0,194,255,0.25);
      padding: 5px 14px;
      border-radius: 20px;
    }

    /* ── LAYOUT: sidebar left, big video right ── */
    .layout {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 0;
      height: calc(100vh - 73px); /* fill below header */
    }

    /* ── LEFT SIDEBAR ── */
    .left-col {
      display: flex;
      flex-direction: column;
      gap: 0;
      background: #000;
      border-right: 1px solid var(--border);
      overflow-y: auto;
      height: 100%;
    }

    .sidebar-section {
      padding: 20px;
      border-bottom: 1px solid var(--border);
    }

    .card-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }

    /* QR */
    .qr-wrap {
      background: #fff;
      border-radius: 10px;
      padding: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 10px;
    }

    .qr-url {
      font-size: 10px;
      color: var(--muted);
      text-align: center;
      word-break: break-all;
    }

    /* Now singing */
    .now-singing-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 42px;
      letter-spacing: 2px;
      line-height: 1;
      color: #fff;
      margin-bottom: 4px;
    }

    .now-singing-song { font-size: 13px; color: var(--muted); }
    .now-singing-song strong { color: var(--cyan); font-weight: 500; }

    .empty-singer {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem;
      letter-spacing: 1px;
      color: var(--muted);
    }

    /* Next Singer button */
    .btn-next {
      display: block;
      width: calc(100% - 40px);
      margin: 16px 20px;
      padding: 16px;
      background: var(--pink);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem;
      letter-spacing: 3px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      flex-shrink: 0;
    }
    .btn-next:hover   { background: #e07800; transform: translateY(-1px); }
    .btn-next:active  { transform: translateY(0); }
    .btn-next:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

    /* Queue list in sidebar */
    .queue-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      gap: 8px;
      flex-wrap: wrap;
    }

    .queue-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      letter-spacing: 2px;
    }
    .queue-title span { color: var(--pink); }

    .meta-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

    .pill {
      font-size: 11px;
      color: var(--muted);
      padding: 3px 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
    }

    .btn-clear {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-clear:hover { color: var(--pink); border-color: rgba(255,0,85,0.3); }

    #queueList { list-style: none; }

    .queue-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      margin-bottom: 6px;
    }

    .queue-item.is-current {
      border-color: rgba(255,0,85,0.35);
      background: rgba(255,0,85,0.06);
    }

    .queue-position {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem;
      color: var(--muted);
      min-width: 26px;
      line-height: 1;
    }
    .queue-item.is-current .queue-position { color: var(--pink); }

    .queue-info { flex: 1; min-width: 0; }

    .queue-singer {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .queue-song {
      font-size: 12px;
      color: var(--muted);
      margin-top: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .up-next-badge {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--pink);
      background: rgba(255,0,85,0.1);
      border: 1px solid rgba(255,0,85,0.2);
      padding: 3px 8px;
      border-radius: 20px;
      flex-shrink: 0;
    }

    .empty-queue {
      text-align: center;
      padding: 30px 16px;
      color: var(--muted);
      font-size: 13px;
      display: none;
    }
    .empty-queue .icon { font-size: 32px; margin-bottom: 10px; opacity: 0.4; }

    /* ── RIGHT: BIG VIDEO ── */
    .right-col {
      display: flex;
      flex-direction: column;
      background: #000;
      height: 100%;
      overflow: hidden;
      position: relative;
    }

    #playerWrap {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: calc(100% - 36px);
      background: #000;
    }

    #playerWrap > * {
      position: absolute;
      top: 0; left: 0;
      width: 100% !important;
      height: 100% !important;
    }

    /* Song list display shown between videos */
    #videoPlaceholder {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      overflow-y: auto;
      padding: 28px 32px;
      background-image: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.65)), url('hero.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index: 2;
    }

    .songlist-header {
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 16px;
    }

    .songlist-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.2rem;
      letter-spacing: 3px;
      color: var(--pink);
      display: block;
    }

    .songlist-sub {
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 1px;
    }

    .songlist-cols {
      columns: 2;
      column-gap: 32px;
    }

    .songlist-entry {
      font-size: 42px;
      color: rgba(255,255,255,0.9);
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      break-inside: avoid;
      line-height: 1.4;
    }

    .songlist-entry.used {
      color: rgba(255,255,255,0.25);
      text-decoration: line-through;
    }

    /* Auto-scroll wrapper */
    #setlistScroller {
      height: calc(100% - 80px);
      overflow: hidden;
      position: relative;
    }

    #setlistTrack {
      animation: scrollList 120s linear infinite;
    }

    #setlistTrack:hover {
      animation-play-state: paused;
    }

    @keyframes scrollList {
      0%   { transform: translateY(0); }
      100% { transform: translateY(-50%); }
    }

    @media (max-width: 1100px) { .songlist-entry { font-size: 16px; } }
    @media (max-width: 860px)  { .songlist-entry { font-size: 14px; } }

    .video-status {
      position: absolute;
      bottom: 0; left: 0;
      width: 100%;
      font-size: 12px;
      padding: 10px 20px;
      color: var(--muted);
      background: rgba(0,0,0,0.85);
      border-top: 1px solid var(--border);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      z-index: 3;
      height: 36px;
    }
    .video-status.found   { color: #4caf7d; }
    .video-status.missing { color: #ff8a65; }
    .video-status.loading { color: var(--cyan); }

    .header-qr {
      background: #fff;
      border-radius: 8px;
      padding: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Folder prompt overlay */
    #folderPrompt {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.75);
      z-index: 999;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .folder-prompt-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 36px 40px;
      text-align: center;
      max-width: 400px;
      width: 90%;
    }

    .folder-prompt-box h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      letter-spacing: 2px;
      margin-bottom: 10px;
    }

    .folder-prompt-box p {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .folder-prompt-box .btn-load {
      width: 100%;
      padding: 14px;
      background: var(--pink);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem;
      letter-spacing: 2px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .folder-prompt-box .btn-load:hover { background: #e07800; }

    .sidebar-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 4px 20px;
    }

    .btn-next-header {
      padding: 12px 24px;
      background: var(--pink);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem;
      letter-spacing: 2px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
    }
    .btn-next-header:hover   { background: #e07800; transform: translateY(-1px); }
    .btn-next-header:active  { transform: translateY(0); }
    .btn-next-header:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
      margin-top: 12px;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 13px;
      cursor: pointer;
      text-decoration: underline;
    }
    @media (max-width: 860px) {
      .layout { grid-template-columns: 1fr; height: auto; }
      .left-col { height: auto; overflow: visible; }
      .right-col { height: 56vw; min-height: 300px; position: relative; }
    }
  </style>
</head>
<body>

<!-- Folder prompt overlay -->
<div id="folderPrompt">
  <div class="folder-prompt-box">
    <h2>Load Backing Tracks</h2>
    <p>Select your <strong>URtheStarSongs</strong> folder so videos can play automatically when Next Singer is pressed.</p>
    <button class="btn-load" id="loadFolderBtn">📁 Select Songs Folder</button>
    <br>
    <button class="btn-skip" id="skipFolderBtn">Skip for now</button>
  </div>
</div>

<header>
  <!-- LEFT: QR + text -->
  <div class="header-left">
    <div class="header-qr">
      <img src="songs-qr-code.png" alt="QR code" style="width:100px; height:100px; display:block;">
    </div>
    <p style="color:var(--cyan); font-family:'Bebas Neue',sans-serif; font-size:1.3rem; letter-spacing:2px; line-height:1.4; margin:0;">Choose your song,<br>Scan the QR Code</p>
  </div>

  <!-- CENTRE: Logo -->
  <div class="header-mid">
    <img src="URTS_logo_2000px.avif" alt="Ur The Star" style="height:90px; width:auto; display:block;">
  </div>

  <!-- RIGHT: Next Singer button -->
  <div class="header-right">
    <button class="btn-next-header" id="nextBtn" disabled>🎤 Next Singer</button>
  </div>
</header>

<div class="layout">

  <!-- LEFT SIDEBAR -->
  <div class="left-col">

    <!-- Now Singing -->
    <div class="sidebar-section" style="border-left: 3px solid var(--pink); padding-left: 17px;">
      <p class="card-label" style="color:rgba(255,0,85,0.6);">Now singing</p>
      <div id="nowSingingContent"><p class="empty-singer">No one yet</p></div>
    </div>

    <hr class="sidebar-divider">

    <!-- Singer Queue -->
    <div class="sidebar-section" style="flex:1; border-bottom:none;">
      <div class="queue-header">
        <h2 class="queue-title">Tonight's <span>Singers</span></h2>
        <div class="meta-row">
          <span class="pill" id="singerCount">0</span>
          <button class="btn-clear" id="clearBtn">Clear</button>
          <button class="btn-clear" id="resetSongsBtn" style="color:var(--cyan); border-color:rgba(11,176,195,0.3);">↺ Reset Songs</button>
        </div>
      </div>
      <p class="pill" id="dateDisplay" style="margin-bottom:14px; display:inline-block;"></p>

      <div class="empty-queue" id="emptyQueue">
        <div class="icon">🎤</div>
        <p>No singers yet.<br>Share the QR!</p>
      </div>

      <ul id="queueList"></ul>
    </div>

  </div>

  <!-- RIGHT: BIG VIDEO -->
  <div class="right-col">
    <div id="playerWrap">
      <video id="localVideo" controls style="width:100%;height:100%;background:#000;display:block;"></video>
    </div>
    <div id="videoPlaceholder">
      <div class="songlist-display">
        <div class="songlist-header">
          <span class="songlist-title">Tonight's Setlist</span>
          <span class="songlist-sub">Pick a song and sign up!</span>
        </div>
        <div id="setlistScroller">
          <div id="setlistTrack">
            <div class="songlist-cols" id="setlistCols"></div>
            <div class="songlist-cols" id="setlistColsDupe"></div>
          </div>
        </div>
      </div>
    </div>
    <p class="video-status" id="videoStatus"></p>
  </div>

</div>

<script>
  const STORAGE_KEY = 'urthestar_queue';
  const DATE_KEY    = 'urthestar_queue_date';

  let localFiles    = {};   // { normalizedName: FileSystemFileHandle }
  let folderLoaded  = false;
  let sheetSongs    = [];   // loaded from songs.json in the folder

  // ── Normalise filename/song for matching ──
  function normalize(s) {
    return s.toLowerCase()
      .replace(/[''`´]/g, "'")
      .replace(/[^a-z0-9 ']/g, ' ')
      .replace(/\s+/g, ' ').trim();
  }

  function scoreMatch(songName, fileName) {
    const sn = normalize(songName);
    const fn = normalize(fileName);
    if (fn === sn) return 100;
    if (fn.includes(sn) || sn.includes(fn)) return 90;
    const trackOnly = normalize(songName.split(/\s[–—-]\s/)[0]);
    if (trackOnly.length > 2 && fn.includes(trackOnly)) return 80;
    const words = sn.split(' ').filter(w => w.length > 2);
    const fSet  = new Set(fn.split(' '));
    const hits  = words.filter(w => fSet.has(w)).length;
    return words.length ? Math.round((hits / words.length) * 65) : 0;
  }

  function findBestLocalMatch(songName) {
    let best = null, top = 0;
    Object.keys(localFiles).forEach(fn => {
      const s = scoreMatch(songName, fn);
      if (s > top) { top = s; best = fn; }
    });
    return top >= 40 ? localFiles[best] : null;
  }

  // ── Folder prompt — loads videos AND songs.json ──
  document.getElementById('loadFolderBtn').addEventListener('click', async function() {
    try {
      const dirHandle = await window.showDirectoryPicker();
      localFiles = {};
      let videoCount = 0;

      for await (const [name, handle] of dirHandle.entries()) {
        if (handle.kind !== 'file') continue;

        // Index video files
        if (/\.(mp4|webm|mov|avi|mkv|m4v)$/i.test(name)) {
          const key = name.replace(/\.[^.]+$/, '');
          localFiles[key] = handle;
          videoCount++;
        }

        // Load songs.json
        if (name.toLowerCase() === 'songs.json') {
          try {
            const file = await handle.getFile();
            const text = await file.text();
            const data = JSON.parse(text);
            sheetSongs = data.map(s => ({
              title:    (s.title  || '').trim(),
              artist:   (s.artist || '').trim(),
              fullName: s.artist ? `${s.title.trim()} – ${s.artist.trim()}` : s.title.trim()
            })).filter(s => s.title);
          } catch(e) {
            console.warn('Could not read songs.json:', e);
          }
        }
      }

      folderLoaded = true;
      document.getElementById('folderPrompt').style.display = 'none';
      const songInfo = sheetSongs.length > 0 ? `, ${sheetSongs.length} songs loaded` : ' — songs.json not found';
      setStatus(`✓ ${videoCount} videos${songInfo}`, 'found');
      renderSetlist();
    } catch(e) {
      if (e.name !== 'AbortError') setStatus('Could not load folder: ' + e.message, 'missing');
    }
  });

  document.getElementById('skipFolderBtn').addEventListener('click', function() {
    document.getElementById('folderPrompt').style.display = 'none';
    // Fall back to fetching songs.json from the website
    fetch('songs.json')
      .then(r => r.json())
      .then(data => {
        sheetSongs = data.map(s => ({
          title:    (s.title  || '').trim(),
          artist:   (s.artist || '').trim(),
          fullName: s.artist ? `${s.title.trim()} – ${s.artist.trim()}` : s.title.trim()
        })).filter(s => s.title);
        renderSetlist();
        setStatus('No backing tracks loaded — songs loaded from website', 'loading');
      })
      .catch(() => setStatus('No backing tracks loaded', 'missing'));
  });

  // ── Play video ──
  async function playVideoForSong(songName) {
    if (!folderLoaded) {
      setStatus('Please load your songs folder first', 'missing');
      showSetlist();
      return;
    }
    const handle = findBestLocalMatch(songName);
    if (!handle) {
      setStatus(`No match found for "${songName}"`, 'missing');
      showSetlist();
      return;
    }
    try {
      const file = await handle.getFile();
      const url  = URL.createObjectURL(file);
      const vid  = document.getElementById('localVideo');
      if (vid.src) URL.revokeObjectURL(vid.src);
      vid.src = url;
      hideSetlist();
      vid.play();
      setStatus('▶ ' + handle.name, 'found');
    } catch(e) {
      setStatus('Error playing file: ' + e.message, 'missing');
      showSetlist();
    }
  }

  // ── Video ended ──
  document.getElementById('localVideo').addEventListener('ended', function() {
    showSetlist();
    setStatus('', '');
    URL.revokeObjectURL(this.src);
    this.src = '';
  });

  // ── Setlist ──
  function getUsedSongs() {
    try {
      const d = localStorage.getItem('urthestar_used_songs_date');
      if (d !== todayStr()) return [];
      return JSON.parse(localStorage.getItem('urthestar_used_songs')) || [];
    } catch { return []; }
  }

  function renderSetlist() {
    const used = getUsedSongs();
    const html = sheetSongs.map(s => {
      const isUsed = used.includes(s.fullName);
      return `<div class="songlist-entry${isUsed ? ' used' : ''}">${s.fullName}</div>`;
    }).join('');
    document.getElementById('setlistCols').innerHTML = html;
    document.getElementById('setlistColsDupe').innerHTML = html;
  }

  async function showSetlist() {
    document.getElementById('videoPlaceholder').style.display = 'block';
    if (sheetSongs.length === 0) await loadSheetSongs();
    renderSetlist();
  }

  function hideSetlist() {
    document.getElementById('videoPlaceholder').style.display = 'none';
  }

  function setStatus(msg, cls) {
    const el = document.getElementById('videoStatus');
    el.textContent = msg;
    el.className = 'video-status' + (cls ? ' ' + cls : '');
  }

  // ── Queue logic ──
  function todayStr() { return new Date().toDateString(); }

  function resetIfNewDay() {
    if (localStorage.getItem(DATE_KEY) !== todayStr()) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify([]));
      localStorage.setItem(DATE_KEY, todayStr());
    }
  }

  function loadQueue() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch { return []; }
  }

  function saveQueue(q) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(q));
    localStorage.setItem(DATE_KEY, todayStr());
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function render() {
    const queue   = loadQueue();
    const list    = document.getElementById('queueList');
    const empty   = document.getElementById('emptyQueue');
    const count   = document.getElementById('singerCount');
    const nextBtn = document.getElementById('nextBtn');
    const nowDiv  = document.getElementById('nowSingingContent');

    count.textContent = `${queue.length} singer${queue.length !== 1 ? 's' : ''}`;
    list.innerHTML = '';

    if (queue.length === 0) {
      empty.style.display = 'block';
      nextBtn.disabled = true;
      currentSinger = null;
      nowDiv.innerHTML = '<p class="empty-singer">No one yet</p>';
      return;
    }

    empty.style.display = 'none';
    nextBtn.disabled = false;

    // Show whoever is currently on stage (set when Next Singer pressed)
    if (currentSinger) {
      nowDiv.innerHTML = `
        <div class="now-singing-name">${esc(currentSinger.name)}</div>
        <div class="now-singing-song">🎵 <strong>${esc(currentSinger.song)}</strong></div>
      `;
    } else {
      const cur = queue[0];
      nowDiv.innerHTML = `
        <div class="now-singing-name">${esc(cur.name)}</div>
        <div class="now-singing-song">🎵 <strong>${esc(cur.song)}</strong></div>
      `;
    }

    queue.forEach((entry, i) => {
      const li = document.createElement('li');
      li.className = 'queue-item' + (i === 0 ? ' is-current' : '');
      li.draggable = true;
      li.dataset.index = i;
      li.innerHTML = `
        <span class="drag-handle">⠿</span>
        <span class="queue-position">${i + 1}</span>
        <div class="queue-info">
          <div class="queue-singer">${esc(entry.name)}</div>
          <div class="queue-song">🎵 ${esc(entry.song)}</div>
        </div>
        ${i === 0 ? '<span class="up-next-badge">Up next</span>' : ''}
      `;
      list.appendChild(li);
    });

    initDragDrop(list);
  }

  let isDragging = false;

  function initDragDrop(list) {
    let dragSrc = null;

    list.querySelectorAll('.queue-item').forEach(item => {
      item.addEventListener('dragstart', function(e) {
        isDragging = true;
        dragSrc = this;
        this.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', this.dataset.index);
      });

      item.addEventListener('dragend', function() {
        isDragging = false;
        this.classList.remove('dragging');
        list.querySelectorAll('.queue-item').forEach(i => i.classList.remove('drag-over'));
      });

      item.addEventListener('dragover', function(e) {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        list.querySelectorAll('.queue-item').forEach(i => i.classList.remove('drag-over'));
        if (this !== dragSrc) this.classList.add('drag-over');
      });

      item.addEventListener('drop', function(e) {
        e.preventDefault();
        if (this === dragSrc) return;
        const fromIdx = parseInt(dragSrc.dataset.index);
        const toIdx   = parseInt(this.dataset.index);
        const queue   = loadQueue();
        const moved   = queue.splice(fromIdx, 1)[0];
        queue.splice(toIdx, 0, moved);
        saveQueue(queue);
        render();
      });
    });
  }

  let currentSinger = null; // the person currently on stage

  document.getElementById('nextBtn').addEventListener('click', function() {
    const queue = loadQueue();
    if (!queue.length) return;
    currentSinger = queue.shift(); // take from top
    saveQueue(queue);
    render();
    playVideoForSong(currentSinger.song);
  });

  document.getElementById('clearBtn').addEventListener('click', function() {
    if (confirm('Clear the entire singer list for tonight?')) {
      currentSinger = null;
      saveQueue([]);
      render();
    }
  });

  document.getElementById('resetSongsBtn').addEventListener('click', function() {
    if (confirm('Reset all songs to available? This clears the used songs list for tonight.')) {
      localStorage.removeItem('urthestar_used_songs');
      localStorage.removeItem('urthestar_used_songs_date');
      showSetlist();
      alert('All songs are now available again!');
    }
  });

  function showDate() {
    document.getElementById('dateDisplay').textContent =
      new Date().toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
  }

  setInterval(function() { if (!isDragging) render(); }, 5000);
  resetIfNewDay();
  showDate();
  // Load songs.json from website as initial fallback (folder picker will override)
  fetch('songs.json')
    .then(r => r.json())
    .then(data => {
      sheetSongs = data.map(s => ({
        title:    (s.title  || '').trim(),
        artist:   (s.artist || '').trim(),
        fullName: s.artist ? `${s.title.trim()} – ${s.artist.trim()}` : s.title.trim()
      })).filter(s => s.title);
      showSetlist();
    })
    .catch(() => showSetlist());
  render();
</script>
</body>
</html>
