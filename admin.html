<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Song Admin - U R The Star</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --pink: #fc8600;
      --cyan: #0bb0c3;
      --bg: #0a0a0a;
      --surface: #141414;
      --surface2: #1e1e1e;
      --border: rgba(255,255,255,0.08);
      --text: #ffffff;
      --muted: rgba(255,255,255,0.45);
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    header {
      padding: 20px 32px;
      background: #000;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    .back-link { color: var(--muted); text-decoration: none; font-size: 14px; transition: color 0.2s; }
    .back-link:hover { color: var(--cyan); }

    .layout {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 28px;
      max-width: 1100px;
      margin: 0 auto;
      padding: 36px 24px 60px;
    }

    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      position: sticky;
      top: 24px;
      align-self: start;
    }

    .card-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      letter-spacing: 2px;
      margin-bottom: 20px;
      color: var(--pink);
    }

    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 7px;
    }
    .form-group input, .form-group select {
      width: 100%;
      padding: 11px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus, .form-group select:focus { border-color: var(--cyan); }
    .form-group input::placeholder { color: rgba(255,255,255,0.2); }
    .form-group select option { background: var(--surface2); }

    .btn-add {
      width: 100%;
      padding: 13px;
      background: var(--pink);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 2px;
      cursor: pointer;
      margin-top: 4px;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-add:hover { background: #e07800; transform: translateY(-1px); }
    .btn-add:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .status-msg {
      text-align: center;
      font-size: 13px;
      margin-top: 12px;
      min-height: 20px;
    }
    .status-msg.ok   { color: #4caf7d; }
    .status-msg.err  { color: #e05555; }
    .status-msg.info { color: var(--cyan); }

    .sheet-link {
      display: block;
      margin-top: 16px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .sheet-link:hover { color: var(--cyan); }

    /* Right col */
    .list-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .list-title { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; letter-spacing: 2px; }
    .list-title span { color: var(--pink); }

    .pill {
      font-size: 13px;
      color: var(--muted);
      padding: 5px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
    }

    .btn-refresh {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      padding: 5px 14px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-refresh:hover { color: var(--cyan); border-color: var(--cyan); }

    .search-wrap { position: relative; margin-bottom: 12px; }
    .search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); opacity: 0.3; pointer-events: none; }
    #adminSearch {
      width: 100%;
      padding: 10px 12px 10px 38px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }
    #adminSearch:focus { border-color: var(--cyan); }
    #adminSearch::placeholder { color: var(--muted); }

    .genre-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .genre-tab {
      padding: 5px 14px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .genre-tab:hover { color: #fff; background: var(--surface2); }
    .genre-tab.active { background: var(--surface2); color: var(--cyan); border-color: var(--cyan); }

    #songAdminList { list-style: none; }

    .admin-song-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 16px;
      margin-bottom: 6px;
    }

    .admin-song-info { flex: 1; min-width: 0; }
    .admin-song-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .admin-song-name .song-title { color: #fff; }
    .admin-song-name .song-artist { color: var(--cyan); font-weight: 400; }

    .genre-badge {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 20px;
      background: rgba(252,134,0,0.15);
      color: var(--pink);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      flex-shrink: 0;
    }

    .btn-remove {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 16px;
      padding: 4px;
      border-radius: 6px;
      line-height: 1;
      transition: color 0.15s;
      flex-shrink: 0;
    }
    .btn-remove:hover { color: #e05555; }

    .loading { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 14px; }
    .no-results { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 14px; display: none; }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }

    .tab-btn {
      padding: 12px 24px;
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      margin-bottom: -1px;
    }

    .tab-btn:hover { color: #fff; }
    .tab-btn.active { color: var(--pink); border-bottom-color: var(--pink); }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Request items ── */
    #requestList { list-style: none; }

    .req-item {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 8px;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .req-count {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      color: var(--pink);
      min-width: 44px;
      line-height: 1;
      text-align: center;
    }

    .req-count-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      display: block;
      text-align: center;
    }

    .req-info { flex: 1; min-width: 0; }

    .req-song { font-size: 16px; font-weight: 600; }
    .req-song .song-title { color: #fff; }
    .req-song .song-artist { color: var(--cyan); font-weight: 400; }

    .req-meta { font-size: 12px; color: var(--muted); margin-top: 3px; }
    .req-note { font-size: 12px; color: rgba(255,255,255,0.5); font-style: italic; margin-top: 3px; }

    .req-badge {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--pink);
      background: rgba(252,134,0,0.1);
      border: 1px solid rgba(252,134,0,0.25);
      padding: 4px 10px;
      border-radius: 20px;
      flex-shrink: 0;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      display: none;
    }

    .empty-state .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.35; }
    .empty-state h3 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .empty-state p { font-size: 14px; color: var(--muted); }

    @media (max-width: 750px) {
      .layout { grid-template-columns: 1fr; }
      .form-card { position: static; }
    }
  </style>
</head>
<body>

<header>
  <img src="URTS_logo_2000px.avif" alt="Ur The Star" style="height:52px; width:auto; display:block;">
  <a href="band.html" class="back-link">← Band Page</a>
</header>

<div class="layout">

  <!-- ADD SONG -->
  <div class="form-card">
    <p class="card-title">Add a Song</p>
    <div class="form-group">
      <label for="newTitle">Song Title</label>
      <input type="text" id="newTitle" placeholder="e.g. Mr. Brightside">
    </div>
    <div class="form-group">
      <label for="newArtist">Artist</label>
      <input type="text" id="newArtist" placeholder="e.g. The Killers">
    </div>
    <div class="form-group">
      <label for="newGenre">Genre</label>
      <select id="newGenre">
        <option value="rock">Rock</option>
        <option value="indie">Indie</option>
        <option value="pop">Pop</option>
        <option value="classic">Classics</option>
        <option value="party">Party</option>
      </select>
    </div>
    <button class="btn-add" id="addBtn">+ Add to Setlist</button>
    <p class="status-msg" id="statusMsg"></p>
    <button id="folderBtn" style="width:100%; margin-top:12px; padding:10px 14px; background:none; border:1px solid var(--border); border-radius:8px; color:var(--muted); font-family:'DM Sans',sans-serif; font-size:13px; cursor:pointer; transition:all 0.15s;">📁 Load Songs Folder</button>
  </div>

  <!-- RIGHT: TABBED PANEL -->
  <div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="setlist">🎵 Setlist</button>
      <button class="tab-btn" data-tab="requests">📩 Song Requests <span id="reqBadge" style="display:none; background:var(--pink); color:#fff; font-size:10px; padding:2px 7px; border-radius:20px; margin-left:6px;"></span></button>
    </div>

    <!-- SETLIST TAB -->
    <div class="tab-panel active" id="tab-setlist">
      <div class="list-header">
        <h2 class="list-title">The <span>Setlist</span></h2>
        <div style="display:flex; align-items:center; gap:10px; flex-wrap:wrap;">
          <span class="pill" id="songCount">Loading…</span>
          <button class="btn-refresh" id="refreshBtn">↺ Refresh</button>
        </div>
      </div>

      <div class="search-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="adminSearch" placeholder="Search songs...">
      </div>

      <div class="genre-tabs" id="genreTabs">
        <button class="genre-tab active" data-genre="all">All</button>
        <button class="genre-tab" data-genre="rock">Rock</button>
        <button class="genre-tab" data-genre="indie">Indie</button>
        <button class="genre-tab" data-genre="pop">Pop</button>
        <button class="genre-tab" data-genre="classic">Classics</button>
        <button class="genre-tab" data-genre="party">Party</button>
      </div>

      <p class="no-results" id="noResults">No songs match.</p>
      <div id="listWrap"><div class="loading">Loading songs from Google Sheets…</div></div>
    </div>

    <!-- REQUESTS TAB -->
    <div class="tab-panel" id="tab-requests">
      <div class="list-header">
        <h2 class="list-title">Song <span>Requests</span></h2>
        <div style="display:flex; align-items:center; gap:10px;">
          <span class="pill" id="reqCount">0 requests</span>
          <button class="btn-refresh" id="clearReqBtn" style="color:var(--pink); border-color:rgba(252,134,0,0.3);">Clear all</button>
        </div>
      </div>
      <p id="reqDate" style="font-size:13px; color:var(--muted); margin-bottom:20px;"></p>

      <div class="empty-state" id="reqEmptyState">
        <div class="icon">🎵</div>
        <h3>No requests yet</h3>
        <p>Share the request link with your audience!</p>
      </div>

      <ul id="requestList"></ul>
    </div>

  </div>

</div>

<script>
  let allSongs    = [];
  let currentGenre = 'all';
  let jsonHandle  = null; // FileSystemFileHandle for songs.json

  // ── Load songs.json from folder ──
  async function loadFromFolder() {
    try {
      const dirHandle = await window.showDirectoryPicker();
      for await (const [name, handle] of dirHandle.entries()) {
        if (name.toLowerCase() === 'songs.json' && handle.kind === 'file') {
          jsonHandle = handle;
          break;
        }
      }
      if (!jsonHandle) {
        setStatus('songs.json not found in that folder', 'err');
        return;
      }
      await loadSongs();
      setStatus('✓ songs.json loaded', 'ok');
      document.getElementById('folderBtn').textContent = '✓ Folder loaded';
      document.getElementById('folderBtn').style.borderColor = 'var(--cyan)';
      document.getElementById('folderBtn').style.color = 'var(--cyan)';
    } catch(e) {
      if (e.name !== 'AbortError') setStatus('Could not open folder: ' + e.message, 'err');
    }
  }

  async function loadSongs() {
    if (!jsonHandle) {
      // Fall back to fetching from website
      try {
        const res  = await fetch('songs.json');
        allSongs   = await res.json();
        renderList();
      } catch(e) {
        document.getElementById('listWrap').innerHTML = `<p style="color:#e05555;text-align:center;padding:30px;">Load your songs folder to edit the setlist.</p>`;
      }
      return;
    }
    try {
      const file = await jsonHandle.getFile();
      const text = await file.text();
      allSongs   = JSON.parse(text);
      renderList();
    } catch(e) {
      setStatus('Could not read songs.json: ' + e.message, 'err');
    }
  }

  async function saveSongs() {
    if (!jsonHandle) {
      setStatus('No folder loaded — cannot save', 'err');
      return false;
    }
    try {
      const writable = await jsonHandle.createWritable();
      await writable.write(JSON.stringify(allSongs, null, 2));
      await writable.close();
      return true;
    } catch(e) {
      setStatus('Could not save: ' + e.message, 'err');
      return false;
    }
  }

  document.getElementById('folderBtn').addEventListener('click', loadFromFolder);

  // ── Render list ──
  function renderList() {
    const term    = document.getElementById('adminSearch').value.toLowerCase();
    const wrap    = document.getElementById('listWrap');
    const noRes   = document.getElementById('noResults');
    const count   = document.getElementById('songCount');

    const filtered = allSongs.filter((s, i) => {
      s._idx = i;
      const matchGenre  = currentGenre === 'all' || (s.genre || '').toLowerCase() === currentGenre;
      const matchSearch = !term || (s.title + ' ' + (s.artist||'')).toLowerCase().includes(term);
      return matchGenre && matchSearch;
    });

    count.textContent = `${allSongs.length} song${allSongs.length !== 1 ? 's' : ''}`;
    wrap.innerHTML = '';
    noRes.style.display = filtered.length === 0 ? 'block' : 'none';

    const ul = document.createElement('ul');
    ul.id = 'songAdminList';
    allSongs.forEach((song, i) => {
      const genre = (song.genre || 'rock').toLowerCase();
      const matchGenre  = currentGenre === 'all' || genre === currentGenre;
      const matchSearch = !term || (song.title + ' ' + (song.artist||'')).toLowerCase().includes(term);
      if (!matchGenre || !matchSearch) return;

      const li = document.createElement('li');
      li.className = 'admin-song-item';
      li.innerHTML = `
        <div class="admin-song-info">
          <div class="admin-song-name">
            <span class="song-title">${esc(song.title)}</span>
            ${song.artist ? `<span class="song-artist"> – ${esc(song.artist)}</span>` : ''}
          </div>
        </div>
        <span class="genre-badge">${esc(genre)}</span>
        <button class="btn-remove" data-idx="${i}" title="Remove">✕</button>
      `;
      ul.appendChild(li);
    });
    wrap.appendChild(ul);

    ul.querySelectorAll('.btn-remove').forEach(btn => {
      btn.addEventListener('click', async function() {
        const idx  = parseInt(this.dataset.idx);
        const song = allSongs[idx];
        if (!confirm(`Remove "${song.title}" from the setlist?`)) return;
        allSongs.splice(idx, 1);
        const saved = await saveSongs();
        if (saved) {
          setStatus(`✓ "${song.title}" removed`, 'ok');
          renderList();
        }
      });
    });
  }

  // ── Add song ──
  document.getElementById('addBtn').addEventListener('click', async function() {
    const title  = document.getElementById('newTitle').value.trim();
    const artist = document.getElementById('newArtist').value.trim();
    const genre  = document.getElementById('newGenre').value;

    if (!title) {
      document.getElementById('newTitle').style.borderColor = 'var(--pink)';
      setTimeout(() => document.getElementById('newTitle').style.borderColor = '', 1500);
      return;
    }

    if (!jsonHandle) {
      setStatus('Load your songs folder first to save changes', 'err');
      return;
    }

    allSongs.push({ title, artist, genre });
    allSongs.sort((a, b) => a.title.localeCompare(b.title));

    const saved = await saveSongs();
    if (saved) {
      setStatus(`✓ "${title}" added!`, 'ok');
      document.getElementById('newTitle').value  = '';
      document.getElementById('newArtist').value = '';
      renderList();
    }
  });

  function setStatus(msg, cls) {
    const el = document.getElementById('statusMsg');
    el.textContent = msg;
    el.className = 'status-msg ' + cls;
    if (cls === 'ok') setTimeout(() => { el.textContent = ''; el.className = 'status-msg'; }, 3000);
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  document.getElementById('genreTabs').addEventListener('click', function(e) {
    if (!e.target.classList.contains('genre-tab')) return;
    document.querySelectorAll('.genre-tab').forEach(t => t.classList.remove('active'));
    e.target.classList.add('active');
    currentGenre = e.target.dataset.genre;
    renderList();
  });

  document.getElementById('adminSearch').addEventListener('input', renderList);
  document.getElementById('refreshBtn').addEventListener('click', loadSongs);

  ['newTitle','newArtist'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('addBtn').click();
    });
  });

  // ── Tab switching ──
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      this.classList.add('active');
      document.getElementById('tab-' + this.dataset.tab).classList.add('active');
      if (this.dataset.tab === 'requests') renderRequests();
    });
  });

  // ── Requests ──
  const REQ_KEY      = 'urthestar_requests';
  const REQ_DATE_KEY = 'urthestar_requests_date';

  function todayStr() { return new Date().toDateString(); }

  function loadRequests() {
    try {
      const date = localStorage.getItem(REQ_DATE_KEY);
      if (date !== todayStr()) return [];
      return JSON.parse(localStorage.getItem(REQ_KEY)) || [];
    } catch { return []; }
  }

  function saveRequests(reqs) {
    localStorage.setItem(REQ_KEY, JSON.stringify(reqs));
    localStorage.setItem(REQ_DATE_KEY, todayStr());
  }

  function renderRequests() {
    const reqs   = loadRequests();
    const list   = document.getElementById('requestList');
    const empty  = document.getElementById('reqEmptyState');
    const count  = document.getElementById('reqCount');
    const badge  = document.getElementById('reqBadge');

    reqs.sort((a, b) => (b.count || 1) - (a.count || 1) || a.timestamp - b.timestamp);
    count.textContent = `${reqs.length} request${reqs.length !== 1 ? 's' : ''}`;

    if (reqs.length > 0) { badge.textContent = reqs.length; badge.style.display = 'inline'; }
    else badge.style.display = 'none';

    document.getElementById('reqDate').textContent =
      new Date().toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

    list.innerHTML = '';
    if (reqs.length === 0) { empty.style.display = 'block'; return; }
    empty.style.display = 'none';

    reqs.forEach((req, idx) => {
      const li = document.createElement('li');
      li.className = 'req-item';
      const names  = req.names && req.names.length ? req.names.join(', ') : (req.name || '');
      const artist = req.artist ? ` – ${req.artist}` : '';
      li.innerHTML = `
        <div class="req-count">
          x${req.count || 1}
          <span class="req-count-label">request${(req.count||1) > 1 ? 's' : ''}</span>
        </div>
        <div class="req-info">
          <div class="req-song">
            <span class="song-title">${esc(req.song)}</span><span class="song-artist">${esc(artist)}</span>
          </div>
          ${names ? `<div class="req-meta">👤 ${esc(names)}</div>` : ''}
          ${req.note ? `<div class="req-note">"${esc(req.note)}"</div>` : ''}
        </div>
        ${(req.count || 1) >= 3 ? '<span class="req-badge">Popular!</span>' : ''}
        <button class="btn-remove" data-idx="${idx}" title="Delete request">✕</button>
      `;
      list.appendChild(li);
    });

    list.querySelectorAll('.btn-remove').forEach(btn => {
      btn.addEventListener('click', function() {
        const reqs = loadRequests();
        const req  = reqs[parseInt(this.dataset.idx)];
        if (!req) return;
        if (confirm(`Delete request for "${req.song}"?`)) {
          reqs.splice(parseInt(this.dataset.idx), 1);
          saveRequests(reqs);
          renderRequests();
        }
      });
    });
  }

  document.getElementById('clearReqBtn').addEventListener('click', function() {
    if (confirm('Clear all song requests?')) { saveRequests([]); renderRequests(); }
  });

  setInterval(() => {
    const reqs  = loadRequests();
    const badge = document.getElementById('reqBadge');
    if (reqs.length > 0) { badge.textContent = reqs.length; badge.style.display = 'inline'; }
    else badge.style.display = 'none';
    if (document.getElementById('tab-requests').classList.contains('active')) renderRequests();
  }, 3600000);

  loadSongs();
</script>
</body>
</html>
